{% extends "base.html" %}
{% block title %}{{ action }} Company - JobTrack{% endblock %}

{% block content %}
<div class="page-header">
    <h1>{{ action }} Company</h1>
</div>

<div class="card form-card">
    <form method="POST">
        <div class="form-group">
            <label for="company_name">Company Name <span class="required">*</span></label>
            <input type="text" id="company_name" name="company_name" class="form-control"
                   value="{{ company.company_name or '' }}" required>
        </div>
        <div class="form-row">
            <div class="form-group">
                <label for="industry">Industry</label>
                <input type="text" id="industry" name="industry" class="form-control"
                       value="{{ company.industry or '' }}">
            </div>
            <div class="form-group">
                <label for="website">Website</label>
                <input type="text" id="website" name="website" class="form-control"
                       value="{{ company.website or '' }}" placeholder="www.example.com">
            </div>
        </div>
        <div class="form-row">
            <div class="form-group">
                <label for="city">City</label>
                <input type="text" id="city" name="city" class="form-control"
                       value="{{ company.city or '' }}">
            </div>
            <div class="form-group">
                <label for="state">State</label>
                <input type="text" id="state" name="state" class="form-control"
                       value="{{ company.state or '' }}">
            </div>
        </div>
        <div class="form-group">
            <label for="notes">Notes</label>
            <textarea id="notes" name="notes" class="form-control" rows="3">{{ company.notes or '' }}</textarea>
        </div>
        <div class="form-actions">
            <a href="{{ url_for('companies') }}" class="btn btn-secondary">Cancel</a>
            <button type="submit" class="btn btn-primary">{{ action }} Company</button>
        </div>
    </form>
</div>
{% endblock %}
