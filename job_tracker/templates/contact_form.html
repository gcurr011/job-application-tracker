{% extends "base.html" %}
{% block title %}{{ action }} Contact - JobTrack{% endblock %}

{% block content %}
<div class="page-header">
    <h1>{{ action }} Contact</h1>
</div>

<div class="card form-card">
    <form method="POST">
        <div class="form-row">
            <div class="form-group">
                <label for="contact_name">Full Name <span class="required">*</span></label>
                <input type="text" id="contact_name" name="contact_name" class="form-control"
                       value="{{ contact.contact_name or '' }}" required>
            </div>
            <div class="form-group">
                <label for="title">Job Title</label>
                <input type="text" id="title" name="title" class="form-control"
                       value="{{ contact.title or '' }}">
            </div>
        </div>
        <div class="form-group">
            <label for="company_id">Company</label>
            <select id="company_id" name="company_id" class="form-control">
                <option value="">-- Select Company --</option>
                {% for c in companies %}
                    <option value="{{ c.company_id }}"
                        {% if contact.company_id and contact.company_id == c.company_id %}selected{% endif %}>
                        {{ c.company_name }}
                    </option>
                {% endfor %}
            </select>
        </div>
        <div class="form-row">
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" class="form-control"
                       value="{{ contact.email or '' }}">
            </div>
            <div class="form-group">
                <label for="phone">Phone</label>
                <input type="text" id="phone" name="phone" class="form-control"
                       value="{{ contact.phone or '' }}">
            </div>
        </div>
        <div class="form-group">
            <label for="linkedin_url">LinkedIn URL</label>
            <input type="text" id="linkedin_url" name="linkedin_url" class="form-control"
                   value="{{ contact.linkedin_url or '' }}" placeholder="https://linkedin.com/in/...">
        </div>
        <div class="form-group">
            <label for="notes">Notes</label>
            <textarea id="notes" name="notes" class="form-control" rows="3">{{ contact.notes or '' }}</textarea>
        </div>
        <div class="form-actions">
            <a href="{{ url_for('contacts') }}" class="btn btn-secondary">Cancel</a>
            <button type="submit" class="btn btn-primary">{{ action }} Contact</button>
        </div>
    </form>
</div>
{% endblock %}
